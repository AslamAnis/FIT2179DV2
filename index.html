<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Australia's Water Imperative</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="consumptionChart" class="chart-frame"></div>
<div id="sectorChart" class="chart-frame"></div>
<div id="heatmapChart" class="chart-frame"></div>
<div id="trajectoryChart" class="chart-frame"></div>
<div id="pricesChart" class="chart-frame"></div>
    <header>
        <h1>Down the Drain: Mapping Australia's Water Security & The Rainwater Solution</h1>
        <p class="metadata">Author: Mohamed Aslam | Date: May 2026</p>
    </header>

    <main class="container">
        <section class="narrative-section">
            <h2>The Cost of Volatility</h2>
            <p>Introductory narrative text goes here to guide the viewer...</p>
            
            <div id="vis1" class="chart-container"></div>
        </section>
    </main>

    <script>
  // Chart 1: Consumption vs Rainfall
  vegaEmbed('#consumptionChart', 'jsons/chart_rain_vs_consumption.json', {actions: false}).catch(console.error);

  // Chart 2: Sector Shares
  vegaEmbed('#sectorChart', 'jsons/chart_sector_shares.json', {actions: false}).catch(console.error);

  // Chart 3: State Heatmap
  vegaEmbed('#heatmapChart', 'jsons/chart_state_heatmap.json', {actions: false}).catch(console.error);

  // Chart 4: Efficiency Trajectory
  vegaEmbed('#trajectoryChart', 'jsons/chart_efficiency_trajectory.json', {actions: false}).catch(console.error);

  // Chart 5: Water Prices
  vegaEmbed('#pricesChart', 'jsons/chart_water_prices.json', {actions: false}).catch(console.error);
</script>

</body>
</html>
